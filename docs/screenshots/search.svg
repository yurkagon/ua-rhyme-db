<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="1200" height="700" fill="#111827"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#1f2937"/>
  <rect x="24" y="16" width="36" height="24" rx="4" fill="#077bad"/>
  <text x="70" y="33" fill="#f3f3f3" font-size="16" font-weight="700">UA RhymeDB</text>
  <text x="900" y="33" fill="#9ca3af" font-size="14">Головна</text>
  <text x="980" y="33" fill="#9ca3af" font-size="14">Пісні</text>

  <!-- Left panel -->
  <rect x="0" y="56" width="380" height="644" fill="#1f2937"/>

  <!-- Search label -->
  <text x="24" y="96" fill="#9ca3af" font-size="13" font-weight="600">Рифмопошук</text>

  <!-- Search input -->
  <rect x="16" y="108" width="340" height="46" rx="8" fill="#374151" stroke="#077bad" stroke-width="2"/>
  <text x="32" y="136" fill="#f3f3f3" font-size="15" font-weight="500">баран</text>
  <rect x="324" y="118" width="22" height="26" rx="6" fill="#077bad"/>
  <text x="329" y="136" fill="white" font-size="14">→</text>

  <!-- Rhyme buttons - curated -->
  <text x="16" y="182" fill="#6b7280" font-size="11">ЗНАЙДЕНІ РИМИ</text>

  <!-- Row 1 -->
  <rect x="16" y="192" width="80" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="56" y="214" fill="#077bad" font-size="13" text-anchor="middle">Степан</text>

  <rect x="106" y="192" width="80" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="146" y="214" fill="#077bad" font-size="13" text-anchor="middle">банан</text>

  <rect x="196" y="192" width="80" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="236" y="214" fill="#077bad" font-size="13" text-anchor="middle">дворах</text>

  <rect x="286" y="192" width="70" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="321" y="214" fill="#077bad" font-size="13" text-anchor="middle">давав</text>

  <!-- Row 2 -->
  <rect x="16" y="236" width="80" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="56" y="258" fill="#077bad" font-size="13" text-anchor="middle">давай</text>

  <rect x="106" y="236" width="100" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="156" y="258" fill="#077bad" font-size="13" text-anchor="middle">взнавай</text>

  <rect x="216" y="236" width="80" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="256" y="258" fill="#077bad" font-size="13" text-anchor="middle">гадай</text>

  <rect x="306" y="236" width="50" height="34" rx="6" fill="none" stroke="#077bad" stroke-width="1.5"/>
  <text x="331" y="258" fill="#077bad" font-size="13" text-anchor="middle">на два</text>

  <!-- Row 3 - algorithmic (lighter) -->
  <text x="16" y="296" fill="#6b7280" font-size="11">АЛГОРИТМІЧНИЙ ПОШУК</text>

  <rect x="16" y="306" width="80" height="34" rx="6" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="56" y="328" fill="#6b7280" font-size="13" text-anchor="middle">таран</text>

  <rect x="106" y="306" width="80" height="34" rx="6" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="146" y="328" fill="#6b7280" font-size="13" text-anchor="middle">жупан</text>

  <rect x="196" y="306" width="90" height="34" rx="6" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="241" y="328" fill="#6b7280" font-size="13" text-anchor="middle">туман</text>

  <rect x="296" y="306" width="60" height="34" rx="6" fill="none" stroke="#4b5563" stroke-width="1"/>
  <text x="326" y="328" fill="#6b7280" font-size="13" text-anchor="middle">каган</text>

  <!-- Right panel -->
  <text x="412" y="96" fill="#f3f3f3" font-size="16" font-weight="600">Де зустрічається в піснях</text>

  <!-- Mention card 1 -->
  <rect x="396" y="108" width="780" height="130" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="396" y="108" width="780" height="38" rx="10" fill="#374151"/>
  <rect x="396" y="128" width="780" height="18" fill="#374151"/>
  <text x="416" y="132" fill="#9ca3af" font-size="13">Глава 94 — Нівелір</text>
  <text x="416" y="168" fill="#f3f3f3" font-size="14">Зрозуміти, хто зі мною з вигоди чоло добив</text>
  <text x="416" y="192" fill="#077bad" font-size="14" font-weight="500">За цю музику мене чекатимуть суди Лінча</text>
  <text x="416" y="216" fill="#077bad" font-size="14" font-weight="500">Дитяча дискотека, але всюди кінча</text>

  <!-- Mention card 2 -->
  <rect x="396" y="254" width="780" height="130" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="396" y="254" width="780" height="38" rx="10" fill="#374151"/>
  <rect x="396" y="274" width="780" height="18" fill="#374151"/>
  <text x="416" y="278" fill="#9ca3af" font-size="13">Глава 94 — Говно</text>
  <text x="416" y="314" fill="#f3f3f3" font-size="14">Я не можу не писати про це тобі</text>
  <text x="416" y="338" fill="#077bad" font-size="14" font-weight="500">Паханий на заводах, руки почорніли</text>
  <text x="416" y="362" fill="#077bad" font-size="14" font-weight="500">Пріоритети — щоб викупати лікаря почерк вміли</text>

  <!-- Mention card 3 -->
  <rect x="396" y="400" width="780" height="110" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <rect x="396" y="400" width="780" height="38" rx="10" fill="#374151"/>
  <rect x="396" y="420" width="780" height="18" fill="#374151"/>
  <text x="416" y="424" fill="#9ca3af" font-size="13">Кашляючий Ед — Не Каліфорнія</text>
  <text x="416" y="460" fill="#077bad" font-size="14" font-weight="500">І знову баран, і знову на стіні</text>
  <text x="416" y="484" fill="#f3f3f3" font-size="14">Де в предків принципи, народ на них не мав ціни</text>
</svg>
