<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="1200" height="700" fill="#111827"/>

  <!-- Header -->
  <rect width="1200" height="56" fill="#1f2937"/>
  <rect x="24" y="16" width="36" height="24" rx="4" fill="#077bad"/>
  <text x="70" y="33" fill="#f3f3f3" font-size="16" font-weight="700">UA RhymeDB</text>
  <text x="900" y="33" fill="#9ca3af" font-size="14">Головна</text>
  <text x="980" y="33" fill="#077bad" font-size="14" font-weight="600">Пісні</text>

  <!-- Page title -->
  <text x="600" y="108" fill="#f3f3f3" font-size="28" font-weight="700" text-anchor="middle">Пісні</text>

  <!-- Artist column 1 - Глава 94 -->
  <rect x="40" y="130" width="340" height="500" rx="12" fill="#1f2937"/>

  <text x="210" y="170" fill="#077bad" font-size="16" font-weight="600" font-style="italic" text-anchor="middle">Глава 94</text>
  <line x1="60" y1="182" x2="360" y2="182" stroke="#374151" stroke-width="1"/>

  <!-- Songs list -->
  <rect x="40" y="192" width="340" height="44" fill="none"/>
  <rect x="40" y="192" width="340" height="44" rx="0" fill="#374151" opacity="0.3"/>
  <text x="60" y="219" fill="#e2e8f0" font-size="14">Твоя черга</text>
  <text x="364" y="219" fill="#4b5563" font-size="18" text-anchor="end">›</text>

  <rect x="40" y="236" width="340" height="44" fill="none"/>
  <text x="60" y="263" fill="#e2e8f0" font-size="14">Нівелір</text>
  <text x="364" y="263" fill="#4b5563" font-size="18" text-anchor="end">›</text>
  <line x1="60" y1="280" x2="360" y2="280" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="307" fill="#e2e8f0" font-size="14">Вируби</text>
  <line x1="60" y1="323" x2="360" y2="323" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="351" fill="#e2e8f0" font-size="14">Зав'язав</text>
  <line x1="60" y1="366" x2="360" y2="366" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="394" fill="#e2e8f0" font-size="14">Говно</text>
  <line x1="60" y1="410" x2="360" y2="410" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="438" fill="#e2e8f0" font-size="14">Найгірша пісня про любов</text>
  <line x1="60" y1="453" x2="360" y2="453" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="481" fill="#e2e8f0" font-size="14">Далі</text>
  <line x1="60" y1="497" x2="360" y2="497" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="524" fill="#e2e8f0" font-size="14">Нате</text>
  <line x1="60" y1="540" x2="360" y2="540" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="568" fill="#e2e8f0" font-size="14">Лезо</text>
  <line x1="60" y1="583" x2="360" y2="583" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="611" fill="#9ca3af" font-size="14">Руки вверх</text>
  <line x1="60" y1="626" x2="360" y2="626" stroke="#1f2937" stroke-width="1"/>


  <!-- Artist column 2 - Кашляючий Ед -->
  <rect x="430" y="130" width="340" height="270" rx="12" fill="#1f2937"/>

  <text x="600" y="170" fill="#077bad" font-size="16" font-weight="600" font-style="italic" text-anchor="middle">Кашляючий Ед</text>
  <line x1="450" y1="182" x2="750" y2="182" stroke="#374151" stroke-width="1"/>

  <text x="450" y="219" fill="#e2e8f0" font-size="14">Дякую</text>
  <line x1="450" y1="235" x2="750" y2="235" stroke="#1f2937" stroke-width="1"/>

  <text x="450" y="263" fill="#e2e8f0" font-size="14">Танцюй</text>
  <line x1="450" y1="279" x2="750" y2="279" stroke="#1f2937" stroke-width="1"/>

  <text x="450" y="307" fill="#e2e8f0" font-size="14">Не Каліфорнія</text>
  <line x1="450" y1="323" x2="750" y2="323" stroke="#1f2937" stroke-width="1"/>


  <!-- Artist column 3 - Тулим -->
  <rect x="820" y="130" width="340" height="180" rx="12" fill="#1f2937"/>

  <text x="990" y="170" fill="#077bad" font-size="16" font-weight="600" font-style="italic" text-anchor="middle">Тулим</text>
  <line x1="840" y1="182" x2="1140" y2="182" stroke="#374151" stroke-width="1"/>

  <text x="840" y="219" fill="#e2e8f0" font-size="14">Сітка</text>
  <line x1="840" y1="235" x2="1140" y2="235" stroke="#1f2937" stroke-width="1"/>

  <!-- Hover state example on one item -->
  <rect x="40" y="192" width="340" height="44" rx="0" fill="#077bad" opacity="0.1"/>
  <rect x="40" y="192" width="3" height="44" fill="#077bad"/>
  <text x="60" y="219" fill="#077bad" font-size="14" font-weight="500">Твоя черга</text>
</svg>
